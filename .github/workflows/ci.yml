name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  web-and-api:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: oceancyber
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d oceancyber"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/oceancyber?schema=public
      JWT_SECRET: ci-jwt-secret-for-build-tests-only
      SESSION_SECRET: ci-session-secret-for-build-tests-only
      NEXT_PUBLIC_SITE_URL: http://127.0.0.1:3020
      NEXT_PUBLIC_API_URL: http://127.0.0.1:4100

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install
        run: npm ci

      - name: Unit tests
        run: npm test

      - name: Lint web
        run: npm run lint

      - name: Lint API (no --fix)
        run: npm run lint:ci --workspace=@oceancyber/api

      - name: Build shared + Prisma client
        run: npm run build:shared && npx prisma generate

      - name: Build Nest API
        run: npm run build --workspace=@oceancyber/api

      - name: Build Next.js
        run: npm run build

      - name: Install Playwright (Chromium)
        run: npx playwright install --with-deps chromium

      - name: E2E smoke (Playwright)
        run: npm run test:e2e
        env:
          CI: true
