# =============================================================================
# OceanCyber — full stack (run from repo root)
#
#   docker compose up -d --build
#
# Services: PostgreSQL 16, Redis 7, NestJS backend (`backend` → host :4100 → container :4000), Next.js `web`
# Internal URLs: postgres:5432, redis:6379, backend:4000 (web uses API_INTERNAL_URL for SSR).
# Postgres and Redis are NOT published on the host (avoids Coolify/shared-host port clashes on 5432/6379).
# For DB/Redis on localhost from your machine, use `docker/docker-compose.dev.yml` or a gitignored `docker-compose.override.yml`.
#
# Optional: point the `web` container at host-mapped Postgres (e.g. dev on port 55432). Use a gitignored
# `docker-compose.override.yml` — see `docker-compose.override.example.yml`. Backend stays on in-stack `postgres` unless you override it too.
#
# After first boot: app → http://localhost:3020 (set NEXT_PUBLIC_SITE_URL / CORS_ORIGIN if host or port differs)
# API health → http://localhost:4100/api/v1/health. URL defaults are non-nested for Coolify env parsing.
#
# Local-only stacks live under docker/ (`docker-compose.dev.yml`, `docker-compose.hotreload.yml`).
# Deploy / Coolify: point only at this file (`docker-compose.yml`).
# =============================================================================

name: oceancyber

services:
  # Default POSTGRES_USER=postgres so the standard role exists (Coolify probes & tools often use "postgres").
  # If you change POSTGRES_USER, set the same in DATABASE_URL / Coolify and wipe the volume on first switch.
  postgres:
    image: postgres:16-alpine
    container_name: oceancyber-db
    restart: unless-stopped
    networks:
      - oceancyber
    environment:
      # Set POSTGRES_* in Coolify or root `.env` (Coolify rejects bash default syntax in merged env files).
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      # Shell inside container expands `$POSTGRES_*` (Compose `$$` becomes `$`).
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: oceancyber-redis
    restart: unless-stopped
    networks:
      - oceancyber
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # NestJS backend — appears as "backend" in Docker Desktop; hostname `backend` on port 4000
  backend:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: oceancyber-backend
    restart: unless-stopped
    networks:
      - oceancyber
    environment:
      NODE_ENV: production
      BACKEND_PORT: "4000"
      # Build URL from POSTGRES_* only (plain substitution for Coolify merge).
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?schema=public
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET}
      SESSION_SECRET: ${SESSION_SECRET}
      CORS_ORIGIN: ${CORS_ORIGIN}
      # Optional: Next.js on-demand revalidation after /admin/content edits (same secret on `web`)
      REVALIDATE_SECRET: ${REVALIDATE_SECRET}
      NEXT_REVALIDATE_URL: ${NEXT_REVALIDATE_URL}
    ports:
      - "${BACKEND_PORT}:4000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:4000/api/v1/health"]
      interval: 15s
      timeout: 5s
      retries: 8
      start_period: 40s

  web:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL}
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
    container_name: oceancyber-web
    restart: unless-stopped
    # Reach host-mapped Postgres from inside the container (e.g. dev DB on 55432). Linux: host-gateway.
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - oceancyber
    environment:
      NODE_ENV: production
      # In-stack Postgres (same as backend). For host-mapped DB in local dev, use `docker-compose.override.yml`.
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?schema=public
      NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL}
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
      # Server-side fetch to Nest — must match Docker service name `backend`
      API_INTERNAL_URL: ${API_INTERNAL_URL}
      # Must match backend REVALIDATE_SECRET when set (admin → POST /api/revalidate)
      REVALIDATE_SECRET: ${REVALIDATE_SECRET}
    ports:
      - "${FRONTEND_PORT}:3000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      backend:
        condition: service_healthy

volumes:
  postgres_data:
  redis_data:

networks:
  oceancyber:
    driver: bridge
