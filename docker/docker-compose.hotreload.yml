# =============================================================================
# OceanCyber — full stack with HOT RELOAD (Docker Desktop / local dev only)
#
#   docker compose -f docker/docker-compose.hotreload.yml up --build
#   docker compose -f docker/docker-compose.hotreload.yml down
#
# Stop other stacks using the same host ports (or set REDIS_PORT / POSTGRES_PORT / FRONTEND_PORT / BACKEND_PORT in `.env`).
# If you also run `docker compose` (production file), run `docker compose down` first to avoid port clashes.
# Uses bind mounts + polling watchers (CHOKIDAR / WATCHPACK) for reliable reloads on macOS/Windows.
#
# Production / Coolify: use only `docker-compose.yml` at the repository root (build + no bind mounts).
# =============================================================================

name: oceancyber-hot

services:
  postgres:
    image: postgres:16-alpine
    container_name: oceancyber-db-hot
    restart: unless-stopped
    networks:
      - oceancyber-hot
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-oceancyber123}
      POSTGRES_DB: ${POSTGRES_DB:-oceancyber}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_hot_data:/var/lib/postgresql/data
      - ../docker/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-oceancyber}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: oceancyber-redis-hot
    restart: unless-stopped
    networks:
      - oceancyber-hot
    command: redis-server --appendonly yes
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_hot_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ..
      dockerfile: Dockerfile.dev
    container_name: oceancyber-backend-hot
    restart: unless-stopped
    networks:
      - oceancyber-hot
    working_dir: /app
    environment:
      NODE_ENV: development
      BACKEND_PORT: "4000"
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-oceancyber123}@postgres:5432/${POSTGRES_DB:-oceancyber}?schema=public
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      SESSION_SECRET: ${SESSION_SECRET:-change-session-secret}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:3020}
      CMS_BASE_URL: ${CMS_BASE_URL:-}
      CMS_STATIC_TOKEN: ${CMS_STATIC_TOKEN:-}
      CHOKIDAR_USEPOLLING: "1"
    ports:
      - "${BACKEND_PORT:-4100}:4000"
    volumes:
      - ..:/app
      - dev_node_modules:/app/node_modules
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: ["npm", "run", "dev:api"]
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:4000/api/v1/health >/dev/null"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 120s

  web:
    build:
      context: ..
      dockerfile: Dockerfile.dev
    container_name: oceancyber-web-hot
    restart: unless-stopped
    networks:
      - oceancyber-hot
    working_dir: /app
    environment:
      NODE_ENV: development
      FRONTEND_PORT: "3000"
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-oceancyber123}@postgres:5432/${POSTGRES_DB:-oceancyber}?schema=public
      NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL:-http://localhost:3020}
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:4100}
      API_INTERNAL_URL: ${API_INTERNAL_URL:-http://backend:4000}
      NEXT_PUBLIC_CMS_URL: ${NEXT_PUBLIC_CMS_URL:-}
      CMS_INTERNAL_URL: ${CMS_INTERNAL_URL:-}
      WATCHPACK_POLLING: "true"
      CHOKIDAR_USEPOLLING: "1"
    ports:
      - "${FRONTEND_PORT:-3020}:3000"
    volumes:
      - ..:/app
      - dev_node_modules:/app/node_modules
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      backend:
        condition: service_healthy
    command: ["npm", "run", "dev"]

  cms:
    profiles:
      - cms
    image: directus/directus:11
    container_name: oceancyber-cms-hot
    restart: unless-stopped
    networks:
      - oceancyber-hot
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "${CMS_PORT:-8055}:8055"
    environment:
      KEY: ${DIRECTUS_KEY:-255d861b-5ea1-5996-9aa3-922530ec40b1}
      SECRET: ${DIRECTUS_SECRET:-6116487b-cda9-0942-295f-8054f7cacb30}
      ADMIN_EMAIL: ${CMS_ADMIN_EMAIL:-admin@oceancyber.local}
      ADMIN_PASSWORD: ${CMS_ADMIN_PASSWORD:-admin123}
      DB_CLIENT: pg
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_DATABASE: oceancyber_cms
      DB_USER: ${POSTGRES_USER:-postgres}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-oceancyber123}
      CACHE_ENABLED: "true"
      CACHE_STORE: redis
      REDIS: redis://redis:6379
      WEBSOCKETS_ENABLED: "true"
      PUBLIC_URL: ${CMS_PUBLIC_URL:-http://localhost:8055}

volumes:
  postgres_hot_data:
  redis_hot_data:
  dev_node_modules:

networks:
  oceancyber-hot:
    driver: bridge
